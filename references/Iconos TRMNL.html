  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1e232d;
      --text: #e8edf5;
      --muted: #9aa4b2;
      --border: #2a3140;
      --accent: #7cc7ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 240px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform .15s ease, border-color .15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #3a465c;
    }

    .icon-wrap {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      padding: 16px;
    }

    .icon-wrap img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .meta {
      padding: 12px;
    }

    .name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .path, .url {
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.45;
    }

    .url a {
      color: var(--accent);
      text-decoration: none;
    }

    .url a:hover {
      text-decoration: underline;
    }
  </style>
</head>

    const count = document.getElementById("count");

    function getName(path) {
      return path.split("/").pop();
    }

    function render(filter = "") {
      const q = filter.trim().toLowerCase();
      const filtered = paths.filter(path =>
        path.toLowerCase().includes(q) ||
        getName(path).toLowerCase().includes(q)
      );

      count.textContent = `${filtered.length} iconos`;

      grid.innerHTML = filtered.map(path => {
        const name = getName(path);
        const fullUrl = prefix + path;

        return `
          <div class="card">
            <div class="icon-wrap">
              <img src="${fullUrl}" alt="${name}" loading="lazy" />
            </div>
            <div class="meta">
              <div class="name">${name}</div>
              <div class="path">${path}</div>
              <div class="url"><a href="${fullUrl}" target="_blank" rel="noopener noreferrer">${fullUrl}</a></div>
            </div>
          </div>
        `;
      }).join("");
    }

    search.addEventListener("input", e => render(e.target.value));
    render();
